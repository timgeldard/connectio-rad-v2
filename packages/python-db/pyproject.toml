[project]
name = "shared-db"
version = "0.1.0"
description = "Shared Databricks SQL execution layer for ConnectIO V2"
requires-python = ">=3.11"
dependencies = [
  "databricks-sdk>=0.20",
  "anyio>=4",
  "fastapi>=0.111",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_db"]
